<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nejati Lab | Team</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./site.css">
</head>
<body class="team-page">
  <video class="background-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="./background.mp4" type="video/mp4">
  </video>
  <div class="background-overlay" aria-hidden="true"></div>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="./index.html">
        <img class="brand-icon" src="./favicon.svg" alt="" aria-hidden="true">
        <span>Nejati Lab</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="./team.html" aria-current="page">Team</a>
        <a href="./publications.html">Publications</a>
        <a href="./gallery.html">Gallery</a>
        <a href="./news.html">News</a>
      </nav>
    </header>

    <main class="team-main">
      <section class="team-gallery" aria-label="Team members">
        <header class="team-header page-intro">
          <p class="page-kicker">Team</p>
          </header>
        <p class="sr-only" data-team-status aria-live="polite"></p>
        <div class="team-grid" data-team-grid role="list"></div>
        <figure class="team-quote">
          <h2 class="team-quote-title">A Thought On Discovery</h2>
          <blockquote>
            <p>"Nothing in life is to be feared, it is only to be understood."</p>
          </blockquote>
          <figcaption>Marie Curie</figcaption>
        </figure>
      </section>
    </main>
  </div>
  <a class="corner-logo" href="./index.html" aria-label="Nejati Lab home">
    <img src="./logo.svg" alt="Nejati Lab logo">
  </a>
  <script src="./site.js"></script>
  <script src="./team.js"></script>
</body>
</html>
