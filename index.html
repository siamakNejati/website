<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siamak Nejati Lab Website</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #e0f2fe, #0f172a);
      color: #0f172a;
    }

    .card {
      background: #f9fafb;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .lab-name {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .tagline {
      font-size: 0.95rem;
      color: #4b5563;
      margin-bottom: 20px;
    }

    .coming-soon {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d4ed8;
    }

    .note {
      font-size: 0.95rem;
      color: #4b5563;
    }

    footer {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="lab-name">Siamak Nejati Lab Website</h1>
    <p class="tagline">Research, innovation, and materials science.</p>

    <p class="coming-soon">The website is coming soon.</p>
    <p class="note">
      Please check back later for more information about the lab, projects, and team.
    </p>
  </main>

  <footer>
    © 2026 Siamak Nejati Lab
  </footer>
</body>
</html>
